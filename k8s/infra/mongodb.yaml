apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: notification-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "nhub"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "nhub1234"
            - name: MONGO_INITDB_DATABASE
              value: "analytics"
          ports:
            - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: notification-hub
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
