server:
  port: 8083

spring:
  application:
    name: delivery-service
  datasource:
    url: jdbc:mysql://localhost:3307/delivery_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:nhub}
    password: ${DB_PASSWORD:nhub1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: localhost:9092

jwt:
  secret: ${JWT_SECRET:bm90aWZpY2F0aW9uaHViLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5n}
  access-token-expire-ms: 3600000
  refresh-token-expire-ms: 86400000

email:
  provider: ${EMAIL_PROVIDER:logging}

sms:
  provider: ${SMS_PROVIDER:logging}

push:
  provider: ${PUSH_PROVIDER:logging}

sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:}
  from-name: ${SENDGRID_FROM_NAME:Notification Hub}
  api-url: ${SENDGRID_API_URL:https://api.sendgrid.com/v3/mail/send}
  subject: ${SENDGRID_SUBJECT:Notification Hub Alert}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}
  messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID:}
  api-url: ${TWILIO_API_URL:https://api.twilio.com/2010-04-01}

fcm:
  project-id: ${FCM_PROJECT_ID:}
  credentials-json: ${FCM_CREDENTIALS_JSON:}
  credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
  api-url: ${FCM_API_URL:https://fcm.googleapis.com/v1}
  title: ${FCM_TITLE:Notification Hub}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

resilience4j:
  retry:
    instances:
      channelDelivery:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      channelDelivery:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
