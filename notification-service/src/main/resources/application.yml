server:
  port: 8082

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:mysql://localhost:3307/notification_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: nhub
    password: nhub1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
